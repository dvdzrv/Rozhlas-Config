server {
    listen 80;
    server_name api.sostrv.org;

    return 301 https://api.sostrv.org$request_uri;
}

server {
    listen 443 ssl;
    server_name api.sostrv.org;

    ssl_certificate /etc/letsencrypt/live/sostrv.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sostrv.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://hlasovanie-backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
